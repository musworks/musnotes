baseURL = "https://www.musnotes.my.id/"
title = "MuS"
theme = "PaperMod"
defaultContentLanguage = "id"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
cleanDestinationDir = true

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true

[taxonomies]
    tag = "tags"
    category = "categories"

[params]
    env = "production"
    defaultTheme = "auto"
    disableThemeToggle = false
    disableLangToggle = false

    ShowReadingTime = true
    ShowShareButtons = false
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowToc = false
    ShowWordCount = false
    ShowFullTextinRSS = true

    ShowCodeCopyButtons = false
    disableScrollToTop = false

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/Musae18"

    [[params.socialIcons]]
        name = "codepen"
        title = "Digital Tools & Lab" # Ini yang bakal muncul saat ikon di-hover
        url = "https://musnotes.gumroad.com/?section=a7r1zAUgatCZskqezjjFQQ==#a7r1zAUgatCZskqezjjFQQ=="


    [params.assets]
        favicon = "favicon.ico"
        favicon16x16 = "favicon-16x16.png"
        favicon32x32 = "favicon-32x32.png"
        apple_touch_icon = "apple-touch-icon.png"
        safari_pinned_tab = "safari-pinned-tab.svg"

[languages]
    [languages.id]
        languageName = "Bahasa Indonesia"
        languageCode = "id-ID"
        weight = 1
        title = "MuS"

        [languages.id.params]
            description = "Catatan reflektif."

            [languages.id.params.profileMode]
                enabled = true
                title = "MuS"
                subtitle = "Lebih sering bingung daripada tahu."
                imageUrl = "https://github.com/Musae18.png"
                imageTitle = "MuS"
                imageWidth = 120
                imageHeight = 120
                imageBorder = false


                [[languages.id.params.profileMode.buttons]]
                    name = "Prosa"
                    url = "/prosa/"

                [[languages.id.params.profileMode.buttons]]
                    name = "Digital Garden"
                    url = "/digital-garden/"

        [[languages.id.menu.main]]
            name = "Quiet Hours"
            url = "https://musae18.github.io/quiet-hours/"
            weight = 10

    [languages.en]
        languageName = "English"
        languageCode = "en-US"
        weight = 2
        title = "MuS"

        [languages.en.params]
            description = "Working Notes"

            [languages.en.params.profileMode]
                enabled = true
                title = "MuS"
                subtitle = "More often confused than knowing."
                imageUrl = "https://github.com/Musae18.png"
                imageTitle = "MuS"
                imageWidth = 120
                imageHeight = 120
                imageBorder = false

            
                [[languages.en.params.profileMode.buttons]]
                    name = "Prose"
                    url = "/en/prosa/"

                [[languages.en.params.profileMode.buttons]]
                    name = "Digital Garden"
                    url = "/en/digital-garden/"

    

        [[languages.en.menu.main]]
            name = "Quiet Hours"
            url = "https://musae18.github.io/quiet-hours/"
            weight = 10
