baseURL = "https://www.musnotes.my.id/"
title = "MuS"
theme = "PaperMod"
defaultContentLanguage = "id"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
cleanDestinationDir = true

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true

[outputs]
    home = ["HTML", "RSS", "JSON"]

[taxonomies]
    tag = "tags"
    category = "categories"

[params]
    env = "production"
    author = "mus"
    siteURL = "https://www.musnotes.my.id/"
    mainSections = ["digital-garden"]
    defaultTheme = "auto"
    disableThemeToggle = false
    disableLangToggle = false

    [params.externalLinks]
        muscrypt = "https://muscrypt.musnotes.my.id/"

    [params.label]
        text = "MuS"
        icon = "mus-logo.png"
        iconHeight = 28

    ShowReadingTime = false
    ShowShareButtons = false
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowToc = false
    ShowWordCount = false
    ShowFullTextinRSS = true

    ShowCodeCopyButtons = false
    disableScrollToTop = false

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/musworks"

    [[params.socialIcons]]
        name = "codepen"
        title = "Digital Tools & Lab" 
        url = "https://musnotes.gumroad.com/?section=a7r1zAUgatCZskqezjjFQQ==#a7r1zAUgatCZskqezjjFQQ=="


    [params.assets]
        favicon = "/favicon.ico"
        favicon16x16 = "favicon-16x16.png"
        favicon32x32 = "favicon-32x32.png"
        apple_touch_icon = "apple-touch-icon.png"
        safari_pinned_tab = "safari-pinned-tab.svg"

[languages]
    [languages.id]
        languageName = "Bahasa Indonesia"
        languageCode = "id-ID"
        weight = 1
        title = "MuS"

        [languages.id.params]
            description = "my garden."

            [languages.id.params.homepage]
                enabled = true
                eyebrow = "PERSONAL BLOG · DIGITAL GARDEN · DIGITAL WORKS STUDIO"
                title = "More often confused than knowing."
                subheadline = "Biology student, digital gardener, and maker of quiet web things."
                intro = "Sebuah arsip untuk catatan non-linear, esai reflektif, pikiran yang belum selesai, dan eksperimen digital kecil."

                [languages.id.params.homepage.primaryButton]
                    name = "Enter the Garden"
                    url = "/digital-garden/"

                [languages.id.params.homepage.secondaryButton]
                    name = "View Digital Works"
                    url = "/projects/"

                [languages.id.params.homepage.visual]
                    caption = "MuS"
                    meta = "est. 2026"
                    symbol = "svg/mus-card.svg"
                    symbolAlt = "musnotes botanical symbol"

            [languages.id.params.profileMode]
                enabled = true
                title = "MuS"
                subtitle = "More often confused than knowing."
                imageUrl = "https://github.com/musworks.png"
                imageTitle = "MuS"
                imageWidth = 120
                imageHeight = 120
                imageBorder = false

                [[languages.id.params.profileMode.buttons]]
                    name = "Digital Garden"
                    url = "/digital-garden/"

        [[languages.id.menu.main]]
            name = "Garden"
            url = "/digital-garden/"
            weight = 10

        [[languages.id.menu.main]]
            name = "Digital works"
            url = "/projects/"
            weight = 20

        [[languages.id.menu.main]]
            name = "Quiet Hours"
            url = "https://quiet-hours.musnotes.my.id/"
            weight = 40

        [[languages.id.menu.main]]
            name = "Archives"
            url = "/archives/"
            weight = 30

        [[languages.id.menu.main]]
            name = "Classification"
            url = "/tags/"
            weight = 35

        [[languages.id.menu.main]]
            name = "Cari"
            pageRef = "/search"
            weight = 60

    [languages.en]
        languageName = "English"
        languageCode = "en-US"
        weight = 2
        title = "MuS"

        [languages.en.params]
            description = "Working Notes"

            [languages.en.params.homepage]
                enabled = true
                eyebrow = "PERSONAL BLOG · DIGITAL GARDEN · DIGITAL WORKS STUDIO"
                title = "More often confused than knowing."
                subheadline = "Biology student, digital gardener, and maker of quiet web things."
                intro = "A quiet archive for non-linear notes, reflective essays, unfinished thoughts, and small digital experiments."

                [languages.en.params.homepage.primaryButton]
                    name = "Enter the Garden"
                    url = "/en/digital-garden/"

                [languages.en.params.homepage.secondaryButton]
                    name = "View Digital Works"
                    url = "/en/projects/"

                [languages.en.params.homepage.visual]
                    caption = "MuS"
                    meta = "est. 2026"
                    symbol = "svg/mus-card.svg"
                    symbolAlt = "musnotes botanical symbol"

            [languages.en.params.profileMode]
                enabled = true
                title = "MuS"
                subtitle = "More often confused than knowing."
                imageUrl = "https://github.com/Musae18.png"
                imageTitle = "MuS"
                imageWidth = 120
                imageHeight = 120
                imageBorder = false

                [[languages.en.params.profileMode.buttons]]
                    name = "Digital Garden"
                    url = "/en/digital-garden/"

    

        [[languages.en.menu.main]]
            name = "Garden"
            url = "/en/digital-garden/"
            weight = 10

        [[languages.en.menu.main]]
            name = "Digital works"
            url = "/en/projects/"
            weight = 20

        [[languages.en.menu.main]]
            name = "Quiet Hours"
            url = "https://quiet-hours.musnotes.my.id/"
            weight = 40

        [[languages.en.menu.main]]
            name = "Archives"
            url = "/archives/"
            weight = 30

        [[languages.en.menu.main]]
            name = "Classification"
            url = "/tags/"
            weight = 35

        [[languages.en.menu.main]]
            name = "Search"
            pageRef = "/search"
            weight = 60
